name: Deploy Phase 1 - Core Infrastructure

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "infra/docker-compose/**"
      - "services/canonical-db-agent/**"
      - "services/auth-acl-agent/**"
      - ".github/workflows/deploy-phase1.yml"

  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  # ============================================================================
  # BUILD AND TEST
  # ============================================================================
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Create .env file for testing
        run: |
          cd infra/docker-compose
          cp .env.example .env

          # Generate secure passwords for testing (alphanumeric only to avoid sed issues)
          export POSTGRES_PASSWORD=$(openssl rand -hex 16)
          export MINIO_ROOT_PASSWORD=$(openssl rand -hex 16)
          export REDIS_PASSWORD=$(openssl rand -hex 16)
          export SECRET_KEY=$(openssl rand -hex 32)

          # Update .env with generated passwords using | as delimiter to avoid issues with special chars
          sed -i "s|POSTGRES_PASSWORD=.*|POSTGRES_PASSWORD=${POSTGRES_PASSWORD}|" .env
          sed -i "s|MINIO_ROOT_PASSWORD=.*|MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}|" .env
          sed -i "s|REDIS_PASSWORD=.*|REDIS_PASSWORD=${REDIS_PASSWORD}|" .env
          sed -i "s|SECRET_KEY=.*|SECRET_KEY=${SECRET_KEY}|" .env

          # Set test OIDC values
          sed -i "s|OIDC_PROVIDER_URL=.*|OIDC_PROVIDER_URL=https://test.example.com|" .env
          sed -i "s|OIDC_CLIENT_ID=.*|OIDC_CLIENT_ID=test-client-id|" .env
          sed -i "s|OIDC_CLIENT_SECRET=.*|OIDC_CLIENT_SECRET=test-client-secret|" .env

      - name: Validate docker-compose configuration
        run: |
          cd infra/docker-compose
          docker compose config --quiet

      - name: Start infrastructure services
        run: |
          cd infra/docker-compose

          echo "Starting services..."
          docker compose up -d postgres redis minio

          echo ""
          echo "Checking if init script is mounted..."
          docker compose exec -T postgres ls -la /docker-entrypoint-initdb.d/ || echo "Init directory not accessible yet"

          # Wait for PostgreSQL to accept connections
          echo ""
          echo "Waiting for PostgreSQL to accept connections..."
          timeout 60 bash -c 'until docker compose exec -T postgres pg_isready -U rag_admin; do sleep 2; done'

          echo "✅ PostgreSQL is accepting connections"

          # Give init scripts time to run
          echo ""
          echo "Waiting for initialization scripts to execute..."
          sleep 10

          # Check PostgreSQL logs for init script execution
          echo ""
          echo "Checking PostgreSQL logs for initialization..."
          docker compose logs postgres | tail -100

          # Check for errors in logs
          echo ""
          echo "Checking for errors in PostgreSQL logs..."
          docker compose logs postgres 2>&1 | grep -i "error" || echo "No errors found in logs"

          # Wait for initialization scripts to complete (check if tables exist)
          echo ""
          echo "Waiting for database tables to be created..."
          timeout 120 bash -c 'until docker compose exec -T postgres psql -U rag_admin -d enterprise_rag -c "\dt" 2>/dev/null | grep -q "tenants"; do
            echo "Waiting for tables... (checking every 5 seconds)";
            docker compose exec -T postgres psql -U rag_admin -d enterprise_rag -c "\dt" 2>/dev/null | head -10 || echo "Database not ready yet";
            sleep 5;
          done'

          echo "✅ PostgreSQL initialized successfully"

          # Wait for all services to be healthy using docker compose ps
          echo ""
          echo "Waiting for all services to be healthy..."
          timeout 120 bash -c 'until docker compose ps | grep -E "(redis|minio)" | grep -v "Up" | wc -l | grep -q "^0$"; do
            echo "Waiting for services...";
            docker compose ps | grep -E "(redis|minio)";
            sleep 5;
          done'

          echo ""
          echo "✅ All services ready"
          docker compose ps

      - name: Check init script execution
        run: |
          cd infra/docker-compose

          echo "Manually running init script to capture errors..."
          docker compose exec -T postgres psql -U rag_admin -d enterprise_rag -f /docker-entrypoint-initdb.d/01-init-database.sql 2>&1 || echo "Init script failed"

          echo ""
          echo "Checking what tables exist after manual run..."
          docker compose exec -T postgres psql -U rag_admin -d enterprise_rag -c "\dt"

      - name: Verify database initialization
        run: |
          cd infra/docker-compose

          echo "Checking database tables..."
          docker compose exec -T postgres psql -U rag_admin -d enterprise_rag -c "\dt"

          echo ""
          echo "Verifying required tables exist..."

          # Check if tables were created
          if ! docker compose exec -T postgres psql -U rag_admin -d enterprise_rag -c "\dt" | grep -q "tenants"; then
            echo "❌ Table 'tenants' not found"
            exit 1
          fi
          echo "✅ Table 'tenants' found"

          if ! docker compose exec -T postgres psql -U rag_admin -d enterprise_rag -c "\dt" | grep -q "users"; then
            echo "❌ Table 'users' not found"
            exit 1
          fi
          echo "✅ Table 'users' found"

          if ! docker compose exec -T postgres psql -U rag_admin -d enterprise_rag -c "\dt" | grep -q "documents"; then
            echo "❌ Table 'documents' not found"
            exit 1
          fi
          echo "✅ Table 'documents' found"

          if ! docker compose exec -T postgres psql -U rag_admin -d enterprise_rag -c "\dt" | grep -q "document_chunks"; then
            echo "❌ Table 'document_chunks' not found"
            exit 1
          fi
          echo "✅ Table 'document_chunks' found"

          if ! docker compose exec -T postgres psql -U rag_admin -d enterprise_rag -c "\dt" | grep -q "access_policies"; then
            echo "❌ Table 'access_policies' not found"
            exit 1
          fi
          echo "✅ Table 'access_policies' found"

          echo ""
          echo "✅ All required database tables created successfully"

      - name: Verify RLS policies
        run: |
          cd infra/docker-compose

          # Check if RLS is enabled
          docker compose exec -T postgres psql -U rag_admin -d enterprise_rag -c "
            SELECT tablename, rowsecurity
            FROM pg_tables
            WHERE schemaname = 'public'
            AND tablename IN ('tenants', 'users', 'documents', 'document_chunks', 'access_policies')
          " | grep -q "t"

          echo "✅ Row-Level Security enabled"

      - name: Verify default data
        run: |
          cd infra/docker-compose

          # Check default tenant
          docker compose exec -T postgres psql -U rag_admin -d enterprise_rag -c "
            SELECT tenant_name FROM tenants WHERE tenant_slug = 'default'
          " | grep -q "Default Tenant"

          # Check system admin
          docker compose exec -T postgres psql -U rag_admin -d enterprise_rag -c "
            SELECT email FROM users WHERE role = 'SUPER_ADMIN'
          " | grep -q "admin@enterprise-rag.local"

          echo "✅ Default data created successfully"

      - name: Stop services
        if: always()
        run: |
          cd infra/docker-compose
          docker compose down -v

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            infra/docker-compose/logs/
            infra/docker-compose/.env

  # ============================================================================
  # DEPLOY TO STAGING
  # ============================================================================
  deploy-staging:
    name: Deploy to Staging
    needs: build-and-test
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.STAGING_SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to staging server
        env:
          SERVER_HOST: ${{ secrets.STAGING_SERVER_HOST }}
          SERVER_USER: ${{ secrets.STAGING_SERVER_USER }}
          DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}
        run: |
          # Create deployment directory structure
          ssh ${SERVER_USER}@${SERVER_HOST} "mkdir -p ${DEPLOY_PATH}"

          # Copy docker-compose files to server
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='__pycache__' \
            --exclude='.env' \
            infra/docker-compose/ ${SERVER_USER}@${SERVER_HOST}:${DEPLOY_PATH}/

          # Copy services directory to server (required for Docker builds)
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.pytest_cache' \
            --exclude='.venv' \
            services/ ${SERVER_USER}@${SERVER_HOST}:${DEPLOY_PATH}/services/

      - name: Create .env file on server
        env:
          SERVER_HOST: ${{ secrets.STAGING_SERVER_HOST }}
          SERVER_USER: ${{ secrets.STAGING_SERVER_USER }}
          DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}
        run: |
          ssh ${SERVER_USER}@${SERVER_HOST} "cat > ${DEPLOY_PATH}/.env << 'EOF'
          ENVIRONMENT=staging
          POSTGRES_DB=${{ secrets.STAGING_POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.STAGING_POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.STAGING_POSTGRES_PASSWORD }}
          POSTGRES_PORT=5432
          MINIO_ROOT_USER=${{ secrets.STAGING_MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD=${{ secrets.STAGING_MINIO_ROOT_PASSWORD }}
          MINIO_API_PORT=9000
          MINIO_CONSOLE_PORT=9001
          MINIO_BROWSER_URL=${{ secrets.STAGING_MINIO_BROWSER_URL }}
          REDIS_PASSWORD=${{ secrets.STAGING_REDIS_PASSWORD }}
          REDIS_PORT=6379
          SECRET_KEY=${{ secrets.STAGING_SECRET_KEY }}
          OIDC_PROVIDER_URL=${{ secrets.STAGING_OIDC_PROVIDER_URL }}
          OIDC_CLIENT_ID=${{ secrets.STAGING_OIDC_CLIENT_ID }}
          OIDC_CLIENT_SECRET=${{ secrets.STAGING_OIDC_CLIENT_SECRET }}
          ALLOWED_ORIGINS=${{ secrets.STAGING_ALLOWED_ORIGINS }}
          LOG_LEVEL=INFO
          CANONICAL_DB_API_PORT=8001
          AUTH_ACL_API_PORT=8002
          API_WORKERS=4
          DOMAIN=${{ secrets.STAGING_DOMAIN }}
          SSL_ENABLED=true
          LETSENCRYPT_EMAIL=${{ secrets.LETSENCRYPT_EMAIL }}
          EOF"

      - name: Deploy with docker-compose
        env:
          SERVER_HOST: ${{ secrets.STAGING_SERVER_HOST }}
          SERVER_USER: ${{ secrets.STAGING_SERVER_USER }}
          DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}
        run: |
          ssh ${SERVER_USER}@${SERVER_HOST} "cd ${DEPLOY_PATH} && \
            docker compose pull && \
            docker compose up -d --remove-orphans && \
            docker compose ps"

      - name: Wait for services to be healthy
        env:
          SERVER_HOST: ${{ secrets.STAGING_SERVER_HOST }}
          SERVER_USER: ${{ secrets.STAGING_SERVER_USER }}
          DEPLOY_PATH: ${{ secrets.STAGING_DEPLOY_PATH }}
        run: |
          ssh ${SERVER_USER}@${SERVER_HOST} "cd ${DEPLOY_PATH} && \
            timeout 120 bash -c 'until docker compose exec -T postgres pg_isready -U rag_admin; do sleep 5; done' && \
            timeout 60 bash -c 'until docker compose exec -T redis redis-cli ping; do sleep 5; done' && \
            timeout 60 bash -c 'until curl -f http://localhost:9000/minio/health/live; do sleep 5; done'"

      - name: Run health checks
        env:
          STAGING_URL: ${{ secrets.STAGING_URL }}
        run: |
          # Wait a bit for services to fully start
          sleep 10

          # Check canonical-db-api health
          curl -f ${STAGING_URL}/api/canonical-db/health || echo "⚠️ Canonical DB API not responding"

          # Check auth-acl-api health
          curl -f ${STAGING_URL}/api/auth-acl/health || echo "⚠️ Auth ACL API not responding"

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Staging deployment successful"
          echo "🔗 Staging URL: ${{ secrets.STAGING_URL }}"

  # ============================================================================
  # DEPLOY TO PRODUCTION
  # ============================================================================
  deploy-production:
    name: Deploy to Production
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.PRODUCTION_SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Create backup before deployment
        env:
          SERVER_HOST: ${{ secrets.PRODUCTION_SERVER_HOST }}
          SERVER_USER: ${{ secrets.PRODUCTION_SERVER_USER }}
          DEPLOY_PATH: ${{ secrets.PRODUCTION_DEPLOY_PATH }}
        run: |
          # Check if deployment exists and services are running
          if ssh ${SERVER_USER}@${SERVER_HOST} "cd ${DEPLOY_PATH} 2>/dev/null && docker compose ps postgres 2>/dev/null | grep -q 'Up'"; then
            echo "Existing deployment found, creating backup..."
            BACKUP_DIR="${DEPLOY_PATH}/backups/$(date +%Y%m%d_%H%M%S)"
            ssh ${SERVER_USER}@${SERVER_HOST} "
              mkdir -p ${BACKUP_DIR} && \
              cd ${DEPLOY_PATH} && \
              docker compose exec -T postgres pg_dump -U rag_admin enterprise_rag > ${BACKUP_DIR}/database.sql && \
              echo '✅ Database backup created: ${BACKUP_DIR}/database.sql'
            "
          else
            echo "⚠️ No existing deployment found, skipping backup (this is a fresh deployment)"
          fi

      - name: Deploy to production server
        env:
          SERVER_HOST: ${{ secrets.PRODUCTION_SERVER_HOST }}
          SERVER_USER: ${{ secrets.PRODUCTION_SERVER_USER }}
          DEPLOY_PATH: ${{ secrets.PRODUCTION_DEPLOY_PATH }}
        run: |
          # Create deployment directory structure
          ssh ${SERVER_USER}@${SERVER_HOST} "mkdir -p ${DEPLOY_PATH}"

          # Copy docker-compose files to server
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='__pycache__' \
            --exclude='.env' \
            infra/docker-compose/ ${SERVER_USER}@${SERVER_HOST}:${DEPLOY_PATH}/

          # Copy services directory to server (required for Docker builds)
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.pytest_cache' \
            --exclude='.venv' \
            services/ ${SERVER_USER}@${SERVER_HOST}:${DEPLOY_PATH}/services/

      - name: Create .env file on server
        env:
          SERVER_HOST: ${{ secrets.PRODUCTION_SERVER_HOST }}
          SERVER_USER: ${{ secrets.PRODUCTION_SERVER_USER }}
          DEPLOY_PATH: ${{ secrets.PRODUCTION_DEPLOY_PATH }}
        run: |
          ssh ${SERVER_USER}@${SERVER_HOST} "cat > ${DEPLOY_PATH}/.env << 'EOF'
          ENVIRONMENT=production
          POSTGRES_DB=${{ secrets.PRODUCTION_POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.PRODUCTION_POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.PRODUCTION_POSTGRES_PASSWORD }}
          POSTGRES_PORT=5432
          MINIO_ROOT_USER=${{ secrets.PRODUCTION_MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD=${{ secrets.PRODUCTION_MINIO_ROOT_PASSWORD }}
          MINIO_API_PORT=9000
          MINIO_CONSOLE_PORT=9001
          MINIO_BROWSER_URL=${{ secrets.PRODUCTION_MINIO_BROWSER_URL }}
          REDIS_PASSWORD=${{ secrets.PRODUCTION_REDIS_PASSWORD }}
          REDIS_PORT=6379
          SECRET_KEY=${{ secrets.PRODUCTION_SECRET_KEY }}
          OIDC_PROVIDER_URL=${{ secrets.PRODUCTION_OIDC_PROVIDER_URL }}
          OIDC_CLIENT_ID=${{ secrets.PRODUCTION_OIDC_CLIENT_ID }}
          OIDC_CLIENT_SECRET=${{ secrets.PRODUCTION_OIDC_CLIENT_SECRET }}
          ALLOWED_ORIGINS=${{ secrets.PRODUCTION_ALLOWED_ORIGINS }}
          LOG_LEVEL=INFO
          CANONICAL_DB_API_PORT=8001
          AUTH_ACL_API_PORT=8002
          API_WORKERS=4
          DOMAIN=${{ secrets.PRODUCTION_DOMAIN }}
          SSL_ENABLED=true
          LETSENCRYPT_EMAIL=${{ secrets.LETSENCRYPT_EMAIL }}
          BACKUP_ENABLED=true
          BACKUP_SCHEDULE=0 2 * * *
          BACKUP_RETENTION_DAYS=30
          EOF"

      - name: Deploy with docker-compose (Blue-Green)
        env:
          SERVER_HOST: ${{ secrets.PRODUCTION_SERVER_HOST }}
          SERVER_USER: ${{ secrets.PRODUCTION_SERVER_USER }}
          DEPLOY_PATH: ${{ secrets.PRODUCTION_DEPLOY_PATH }}
        run: |
          ssh ${SERVER_USER}@${SERVER_HOST} "cd ${DEPLOY_PATH} && \
            docker compose pull && \
            docker compose up -d --remove-orphans && \
            docker compose ps"

      - name: Wait for services to be healthy
        env:
          SERVER_HOST: ${{ secrets.PRODUCTION_SERVER_HOST }}
          SERVER_USER: ${{ secrets.PRODUCTION_SERVER_USER }}
          DEPLOY_PATH: ${{ secrets.PRODUCTION_DEPLOY_PATH }}
        run: |
          ssh ${SERVER_USER}@${SERVER_HOST} "cd ${DEPLOY_PATH} && \
            timeout 120 bash -c 'until docker compose exec -T postgres pg_isready -U rag_admin; do sleep 5; done' && \
            timeout 60 bash -c 'until docker compose exec -T redis redis-cli ping; do sleep 5; done' && \
            timeout 60 bash -c 'until curl -f http://localhost:9000/minio/health/live; do sleep 5; done'"

      - name: Run health checks
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
        run: |
          # Wait for services to fully start
          sleep 15

          # Check canonical-db-api health
          curl -f ${PRODUCTION_URL}/api/canonical-db/health

          # Check auth-acl-api health
          curl -f ${PRODUCTION_URL}/api/auth-acl/health

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Production deployment successful"
          echo "🔗 Production URL: ${{ secrets.PRODUCTION_URL }}"

      - name: Rollback on failure
        if: failure()
        env:
          SERVER_HOST: ${{ secrets.PRODUCTION_SERVER_HOST }}
          SERVER_USER: ${{ secrets.PRODUCTION_SERVER_USER }}
          DEPLOY_PATH: ${{ secrets.PRODUCTION_DEPLOY_PATH }}
        run: |
          echo "❌ Deployment failed, initiating rollback..."
          ssh ${SERVER_USER}@${SERVER_HOST} "cd ${DEPLOY_PATH} && \
            docker compose down && \
            # Restore from latest backup if needed
            echo '⚠️ Manual intervention may be required'"

