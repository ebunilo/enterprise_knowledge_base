# MinIO direct access (optional, for S3 clients)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name storage.igwilo.com;

    # SSL configuration using existing wildcard certificate
    ssl_certificate /etc/letsencrypt/live/igwilo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/igwilo.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/igwilo.com/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Client body size limit
    client_max_body_size 100M;

    # Proxy to MinIO
    location / {
        proxy_pass http://minio_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Buffering
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Logging
    access_log /var/log/nginx/storage_access.log combined;
    error_log /var/log/nginx/storage_error.log warn;
}

