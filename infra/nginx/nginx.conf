# Enterprise RAG System - Nginx Configuration
# Optimized for igwilo.com with existing wildcard SSL certificate
# Phase 1: Core Infrastructure

# Upstream definitions
upstream canonical_db_api {
    server 127.0.0.1:9401;
    keepalive 32;
}

upstream auth_acl_api {
    server 127.0.0.1:9402;
    keepalive 32;
}

upstream minio_api {
    server 127.0.0.1:9310;
    keepalive 32;
}

upstream minio_console {
    server minio:9311;
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=10r/m;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# HTTP to HTTPS redirect - Main RAG Frontend
server {
    listen 80;
    listen [::]:80;
    server_name rag.igwilo.com;

    # Let's Encrypt ACME challenge (for certificate renewal)
    # location /.well-known/acme-challenge/ {
    #     root /var/www/certbot;
    # }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTP to HTTPS redirect - API Gateway
server {
    listen 80;
    listen [::]:80;
    server_name api.igwilo.com;

    # Redirect all traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server - Main RAG Frontend
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name rag.igwilo.com;

    # SSL configuration using existing wildcard certificate
    ssl_certificate /etc/letsencrypt/live/igwilo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/igwilo.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/igwilo.com/chain.pem;

    # SSL protocols and ciphers (Mozilla Intermediate configuration)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;

    # SSL session cache
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'self';" always;

    # Client body size limit
    client_max_body_size 100M;
    client_body_buffer_size 128k;

    # Timeouts
    client_body_timeout 60s;
    client_header_timeout 60s;
    keepalive_timeout 65s;
    send_timeout 60s;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";

    # Connection limits
    limit_conn conn_limit 10;

    # Root location
    location / {
        return 200 '{"status":"ok","service":"Enterprise RAG System","phase":"1","version":"0.1.0","domain":"igwilo.com"}';
        add_header Content-Type application/json;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 '{"status":"healthy","timestamp":"$time_iso8601","service":"enterprise-rag"}';
        add_header Content-Type application/json;
    }

    # Canonical DB Agent API
    location /api/canonical-db/ {
        # Rate limiting
        limit_req zone=api_limit burst=10 nodelay;

        # Proxy settings
        proxy_pass http://canonical_db_api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        # Error handling
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
        proxy_next_upstream_tries 2;
    }

    # Auth ACL Agent API
    location /api/auth-acl/ {
        # Rate limiting (stricter for auth endpoints)
        limit_req zone=auth_limit burst=5 nodelay;

        # Proxy settings
        proxy_pass http://auth_acl_api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        # Error handling
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
        proxy_next_upstream_tries 2;
    }

    # MinIO API (S3-compatible)
    location /storage/ {
        # Rate limiting for uploads
        limit_req zone=upload_limit burst=3 nodelay;

        # Proxy settings
        proxy_pass http://minio_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts (longer for file uploads)
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Buffering (disabled for streaming)
        proxy_buffering off;
        proxy_request_buffering off;

        # Chunked transfer encoding
        chunked_transfer_encoding on;
    }

    # MinIO Console
    location /storage-console/ {
        # Authentication required (handled by MinIO)
        proxy_pass http://minio_console/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # WebSocket support
        proxy_buffering off;
    }

    # API documentation (future)
    location /docs {
        return 503 '{"error":"API documentation not yet available","phase":"1"}';
        add_header Content-Type application/json;
    }

    # Metrics endpoint (Prometheus)
    location /metrics {
        # Restrict access to monitoring systems
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://canonical_db_api/metrics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Logging
    access_log /var/log/nginx/rag_access.log combined buffer=32k flush=5s;
    error_log /var/log/nginx/rag_error.log warn;
}

